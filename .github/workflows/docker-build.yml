name: 🐳 Build & Push Docker Image

on:
  push:
    branches: [ "main" ]  
  workflow_call:
    inputs:
      tag:
        description: "Release tag (git ref + default Docker tag)"
        required: true
        type: string
      image_tag:
        description: "Docker image tag (defaults to tag)"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      tag:
        description: "Git ref to checkout (tag, branch, or SHA)"
        required: true
        type: string
        default: main
      image_tag:
        description: "Docker image tag (defaults to git ref)"
        required: false
        type: string
        default: ""

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository_owner }}/picoclaw
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}

jobs:
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}

      # ── Docker Buildx ─────────────────────────
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Login to GHCR ─────────────────────────
      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Login to Docker Hub (only if configured) ─
      - name: 🔑 Login to Docker Hub
        if: ${{ vars.DOCKERHUB_REPOSITORY != '' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Prepare tags (Docker Hub optional) ──────
      - name: 🏷️ Prepare tags
        id: tags
        shell: bash
        run: |
          IMG_TAG='${{ inputs.image_tag }}'
          [ -z "$IMG_TAG" ] && IMG_TAG='${{ inputs.tag }}'
          {
            echo 'tags<<TAGS_EOF'
            echo '${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:'"$IMG_TAG"
            echo '${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest'
            if [ -n '${{ env.DOCKERHUB_IMAGE_NAME }}' ]; then
              echo '${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:'"$IMG_TAG"
              echo '${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:latest'
            fi
            echo 'TAGS_EOF'
          } >> "$GITHUB_OUTPUT"

      # ── Build & Push ──────────────────────────
      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.codeserve.main
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
