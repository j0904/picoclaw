name: Release WhatsApp Native

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0-whatsapp-native)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: true
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

jobs:
  release-whatsapp-native:
    name: Build and Release WhatsApp Native
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go from go.mod
        id: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install cross compilers
        run: |
          sudo apt-get update && sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu \
            gcc-loongarch64-linux-gnu \
            gcc-riscv64-linux-gnu \
            mingw-w64

      - name: Build WhatsApp Native binaries
        run: |
          mkdir -p build
          TAG=${{ inputs.tag }}
          
          echo "Downloading dependencies..."
          go mod download
          
          echo "Copying workspace for embed..."
          mkdir -p cmd/picoclaw/internal/onboard/workspace
          cp -r workspace/* cmd/picoclaw/internal/onboard/workspace/
          
          echo "Building for Linux amd64..."
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-linux-gnu-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-amd64 ./cmd/picoclaw
          
          echo "Building for Linux arm64..."
          GOOS=linux GOARCH=arm64 CGO_ENABLED=1 CC=aarch64-linux-gnu-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-arm64 ./cmd/picoclaw
          
          echo "Building for Linux armv7..."
          GOOS=linux GOARCH=arm GOARM=7 CGO_ENABLED=1 CC=arm-linux-gnueabihf-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-arm ./cmd/picoclaw
          
          echo "Building for Linux loong64..."
          GOOS=linux GOARCH=loong64 CGO_ENABLED=1 CC=loongarch64-linux-gnu-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-loong64 ./cmd/picoclaw
          
          echo "Building for Linux riscv64..."
          GOOS=linux GOARCH=riscv64 CGO_ENABLED=1 CC=riscv64-linux-gnu-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-riscv64 ./cmd/picoclaw
          
          echo "Building for Linux mipsle..."
          GOOS=linux GOARCH=mipsle GOMIPS=softfloat CGO_ENABLED=0 go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-linux-mipsle ./cmd/picoclaw
          
          echo "Building for macOS arm64..."
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-darwin-arm64 ./cmd/picoclaw
          
          echo "Building for Windows amd64..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 CC=x86_64-w64-mingw32-gcc go build -tags whatsapp_native -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=$TAG" -o build/picoclaw-windows-amd64.exe ./cmd/picoclaw
          
          echo "Build complete!"
          ls -lh build/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: PicoClaw ${{ inputs.tag }} - WhatsApp Native
          body: |
            ## PicoClaw with WhatsApp Native Support
            
            This release includes WhatsApp native support using [whatsmeow](https://github.com/tulir/whatsmeow). No separate bridge required.
            
            ### Features
            - ✅ WhatsApp native (in-process) support
            - ✅ Multi-platform binaries
            - ✅ QR code authentication
            
            ### Installation
            
            Download the binary for your platform and run:
            ```bash
            ./picoclaw
            ```
            
            ### WhatsApp Setup
            
            1. Configure WhatsApp channel with `"use_native": true`
            2. On first run, scan the QR code with WhatsApp (Linked Devices)
            3. Session is stored under `workspace/whatsapp/`
            
            ### Supported Platforms
            
            - Linux (amd64, arm64, armv7, loong64, riscv64, mipsle)
            - macOS (arm64)
            - Windows (amd64)
            
            > **Note**: This is a special build with WhatsApp native support. The binary is larger than the standard release due to the included WhatsApp library.
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            build/picoclaw-linux-amd64
            build/picoclaw-linux-arm64
            build/picoclaw-linux-arm
            build/picoclaw-linux-loong64
            build/picoclaw-linux-riscv64
            build/picoclaw-linux-mipsle
            build/picoclaw-darwin-arm64
            build/picoclaw-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
