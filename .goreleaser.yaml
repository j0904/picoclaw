# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

git:
  ignore_tags:
    - nightly
    - ".*-nightly.*"

before:
  hooks:
    - go mod tidy
    - go generate ./...
    - sh -c 'cd web/frontend && pnpm install && pnpm build:backend'
    - sh -c 'go install github.com/tc-hib/go-winres@latest && go-winres make --in web/backend/winres/winres.json --out web/backend/rsrc --product-version={{ .Version }} --file-version={{ .Version }}'

builds:
  - id: picoclaw-linux-amd64
    env:
      - CGO_ENABLED=0
    tags:
      - stdjson
      - whatsapp_native
      - goolm
    ldflags:
      - -s -w
      - -X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}
      - -X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}
      - -X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}
      - -X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ .Env.GOVERSION }}
    goos:
      - linux
    goarch:
      - amd64
    main: ./cmd/picoclaw

  - id: picoclaw-linux-arm64
    env:
      - CGO_ENABLED=0
    tags:
      - stdjson
      - whatsapp_native
      - goolm
    ldflags:
      - -s -w
      - -X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}
      - -X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}
      - -X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}
      - -X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ .Env.GOVERSION }}
    goos:
      - linux
    goarch:
      - arm64
    main: ./cmd/picoclaw

  - id: picoclaw-windows-amd64
    env:
      - CGO_ENABLED=0
    tags:
      - stdjson
      - whatsapp_native
      - goolm
    ldflags:
      - -s -w
      - -X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}
      - -X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}
      - -X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}
      - -X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ .Env.GOVERSION }}
    goos:
      - windows
    goarch:
      - amd64
    main: ./cmd/picoclaw

  - id: picoclaw-windows-arm64
    env:
      - CGO_ENABLED=0
    tags:
      - goolm
      - stdjson
    ldflags:
      - -s -w
      - -X github.com/sipeed/picoclaw/pkg/config.Version={{ .Version }}
      - -X github.com/sipeed/picoclaw/pkg/config.GitCommit={{ .ShortCommit }}
      - -X github.com/sipeed/picoclaw/pkg/config.BuildTime={{ .Date }}
      - -X github.com/sipeed/picoclaw/pkg/config.GoVersion={{ .Env.GOVERSION }}
    goos:
      - windows
    goarch:
      - arm64
    main: ./cmd/picoclaw

  - id: picoclaw-launcher
    binary: picoclaw-launcher
    env:
      - CGO_ENABLED=0
    tags:
      - goolm
      - stdjson
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./web/backend

  - id: picoclaw-launcher-tui
    binary: picoclaw-launcher-tui
    env:
      - CGO_ENABLED=0
    tags:
      - goolm
      - stdjson
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/picoclaw-launcher-tui

archives:
  - id: picoclaw
    ids:
      - picoclaw-linux-amd64
      - picoclaw-linux-arm64
      - picoclaw-windows-amd64
      - picoclaw-windows-arm64
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: picoclaw-launcher
    ids:
      - picoclaw-launcher
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-launcher_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: picoclaw-launcher-tui
    ids:
      - picoclaw-launcher-tui
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}-launcher-tui_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

dockers:
  - id: picoclaw-alpine-amd64
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-alpine-amd64"
      - "ghcr.io/j0904/picoclaw:latest-alpine-amd64"
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-amd64"
      - "ghcr.io/j0904/picoclaw:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }} - AI assistant"
      - "--label=org.opencontainers.image.url=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"
    extra_files:
      - docker/entrypoint.sh

  - id: picoclaw-alpine-arm64
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    image_templates:
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-alpine-arm64"
      - "ghcr.io/j0904/picoclaw:latest-alpine-arm64"
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-arm64"
      - "ghcr.io/j0904/picoclaw:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description={{ .ProjectName }} - AI assistant"
      - "--label=org.opencontainers.image.url=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.created={{ time \"2006-01-02T15:04:05Z07:00\" }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=MIT"
    extra_files:
      - docker/entrypoint.sh

docker_manifests:
  - name_template: "ghcr.io/j0904/picoclaw:{{ .Tag }}-alpine"
    image_templates:
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-alpine-amd64"
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-alpine-arm64"
  - name_template: "ghcr.io/j0904/picoclaw:latest-alpine"
    image_templates:
      - "ghcr.io/j0904/picoclaw:latest-alpine-amd64"
      - "ghcr.io/j0904/picoclaw:latest-alpine-arm64"
  - name_template: "ghcr.io/j0904/picoclaw:{{ .Tag }}"
    image_templates:
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-amd64"
      - "ghcr.io/j0904/picoclaw:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/j0904/picoclaw:latest"
    image_templates:
      - "ghcr.io/j0904/picoclaw:latest-amd64"
      - "ghcr.io/j0904/picoclaw:latest-arm64"

release:
  disable: '{{ isEnvSet "NIGHTLY_BUILD" }}'
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
